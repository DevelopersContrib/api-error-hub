# Custom domain: log.vnoc.com
# After deploy, go to CF dashboard → Workers → api-error-hub → Triggers → Custom Domains → Add "log.vnoc.com"
# Or use: wrangler domains add log.vnoc.com

[vars]
# VNOC API for domain info
VNOC_API_URL = "https://manage.vnoc.com"
VNOC_API_KEY = "b102e32a4bf14b575f352186e265ed7c7272cde4ded39f0c478530f6b358c9c4"
# Resend for email alerts
RESEND_API_KEY = "re_fBcrxGWe_Q22pnqbFd9euHVh8DNRfZag4"
RESEND_FROM = "VNOC Error Hub <noreply@send.vnoc.com>"
ALERT_RECIPIENTS = "maida@vnoc.com,kjabellar@gmail.com,rownone@gmail.com"
INGEST_KEY = "vnoc-hub-2024-ingest-k8x9m2"
ALLOWED_EMAILS = "admin@domaindirectory.com,kjabellar@gmail.com,rownone@gmail.com,maidabarrientos@gmail.com,chad@ecorp.com,ecorpcom@gmail.com"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "api-error-hub-db"
database_id = "ea90fd11-af41-41f8-92c3-a29e95fc59f7"

# Weekly cron: send error digest email every Tuesday at 8 AM UTC (4 AM ET)
# Critical alerts are sent in real-time when AI detects critical errors or error spikes occur
[triggers]
crons = ["0 8 * * 2"]
